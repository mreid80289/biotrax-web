<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioTrax — Quiet support, in the background.</title>
  <meta name="description" content="BioTrax is a depression coach and relapse-prevention system for iPhone and Apple Watch. It watches sleep, stress and isolation — and surfaces help only when it's needed." />
  <meta property="og:title" content="BioTrax — Quiet support, in the background." />
  <meta property="og:description" content="A safety net you can't see. Continuous wellness intelligence for iPhone and Apple Watch." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="/assets/home.png" fetchpriority="high" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0d0c; color: #fff; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    img { -webkit-user-drag: none; user-select: none; }
    ::selection { background: rgba(52,211,153,0.3); }
    input[type="range"] { -webkit-appearance: none; appearance: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track { background: transparent; border: none; }

    @keyframes biotrax-bullet-pulse {
      0%   { box-shadow: 0 0 0 0 var(--pulse-color, rgba(52,211,153,0.55)); }
      70%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .bullet-pulse {
      animation: biotrax-bullet-pulse 2.4s infinite ease-out;
    }
    @media (prefers-reduced-motion: reduce) {
      .bullet-pulse { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
