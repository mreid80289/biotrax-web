<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioTrax — The first signal is the quietest.</title>
  <meta name="description" content="BioTrax is an early-warning system for your mental health. By passively tracking your stress and sleep, it quietly alerts someone in your corner before a slump takes over." />
  <meta property="og:title" content="BioTrax — The first signal is the quietest." />
  <meta property="og:description" content="An early-warning system for your mental health. Passive stress and sleep tracking on iPhone and Apple Watch — alerts someone in your corner before a slump takes over." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="/assets/home.png" fetchpriority="high" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0d0c; color: #fff; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    img { -webkit-user-drag: none; user-select: none; }
    ::selection { background: rgba(52,211,153,0.3); }
    input[type="range"] { -webkit-appearance: none; appearance: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track { background: transparent; border: none; }

    @keyframes biotrax-bullet-pulse {
      0%   { box-shadow: 0 0 0 0 var(--pulse-color, rgba(52,211,153,0.55)); }
      70%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .bullet-pulse {
      animation: biotrax-bullet-pulse 2.4s infinite ease-out;
    }

    /* Slow breath-rhythm opacity pulse for the hero phone glow halo —
       roughly 12-15 breaths per minute (calm but visible). The glow is
       what's animating, not the phone or its content. Pauses on cursor
       interaction so the active tilt feels distinct. */
    @keyframes biotrax-breath {
      0%, 100% { opacity: 0.45; transform: scale(1);    }
      50%      { opacity: 1;    transform: scale(1.08); }
    }
    .biotrax-breath {
      animation: biotrax-breath 4.5s infinite ease-in-out;
      transform-origin: center center;
    }

    @media (prefers-reduced-motion: reduce) {
      .bullet-pulse   { animation: none; }
      .biotrax-breath { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
