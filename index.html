<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioTrax — The first signal is the quietest.</title>
  <meta name="description" content="BioTrax is an early-warning system for your mental health. By passively tracking your stress and sleep, it quietly alerts someone in your corner before a slump takes over." />
  <meta property="og:title" content="BioTrax — The first signal is the quietest." />
  <meta property="og:description" content="An early-warning system for your mental health. Passive stress and sleep tracking on iPhone and Apple Watch — alerts someone in your corner before a slump takes over." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="/assets/home.png" fetchpriority="high" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { margin: 0; padding: 0; background: #0a0d0c; color: #fff; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    img { -webkit-user-drag: none; user-select: none; }
    ::selection { background: rgba(52,211,153,0.3); }
    input[type="range"] { -webkit-appearance: none; appearance: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track { background: transparent; border: none; }

    @keyframes biotrax-bullet-pulse {
      0%   { box-shadow: 0 0 0 0 var(--pulse-color, rgba(52,211,153,0.55)); }
      70%  { box-shadow: 0 0 0 8px transparent; }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .bullet-pulse {
      animation: biotrax-bullet-pulse 2.4s infinite ease-out;
    }

    /* Slow breath-rhythm opacity pulse for the hero phone glow halo —
       roughly 10 breaths per minute (resting respiration), the cadence
       most wellness apps target for "calm" framing. Pauses on mouse
       interaction so the active tilt feels distinct. */
    @keyframes biotrax-breath {
      0%, 100% { opacity: 0.75; }
      50%      { opacity: 1;    }
    }
    .biotrax-breath {
      animation: biotrax-breath 6s infinite ease-in-out;
    }

    /* Hero phone chip choreography — staggered fade-in on page load.
       Each chip starts hidden and slides into place from the appropriate
       edge. They settle quickly (single-shot, not a loop) so the phone
       feels deliberate, not gimmicky. The animation-delay sets each
       chip's entry time:
         SCORE  -> 800ms  (primary value, lands first)
         STRESS -> 1400ms (supporting biometric)
         CONTACT-> 2000ms (safety-net story closes the sequence)
       The 'forwards' fill-mode keeps each chip in its final state once
       the keyframes finish, so they remain visible afterward. */
    @keyframes biotrax-chip-from-left {
      0%   { opacity: 0; transform: translateZ(60px) translateX(-16px); }
      100% { opacity: 1; transform: translateZ(60px) translateX(0);     }
    }
    @keyframes biotrax-chip-from-right-top {
      0%   { opacity: 0; transform: translateZ(80px) translateX(16px); }
      100% { opacity: 1; transform: translateZ(80px) translateX(0);    }
    }
    @keyframes biotrax-chip-from-right-bottom {
      0%   { opacity: 0; transform: translateZ(50px) translateX(16px); }
      100% { opacity: 1; transform: translateZ(50px) translateX(0);    }
    }
    .biotrax-chip {
      opacity: 0;
      animation-fill-mode: forwards;
      animation-duration: 700ms;
      animation-timing-function: cubic-bezier(.2,.7,.3,1);
    }
    .biotrax-chip-score   { animation-name: biotrax-chip-from-left;         animation-delay:  800ms; }
    .biotrax-chip-stress  { animation-name: biotrax-chip-from-right-top;    animation-delay: 1400ms; }
    .biotrax-chip-contact { animation-name: biotrax-chip-from-right-bottom; animation-delay: 2000ms; }

    /* Single-shot pulse on the CONTACT chip's dot, fired after the chip
       has settled. Plants 'this is alive, monitoring you' without a
       continuous loop. Animation-delay matches the chip's settle time
       (chip lands at 2000+700=2700ms). */
    @keyframes biotrax-chip-dot-pulse {
      0%   { box-shadow: 0 0 8px rgba(52,211,153,0.7), 0 0 0 0  rgba(52,211,153,0.55); }
      70%  { box-shadow: 0 0 8px rgba(52,211,153,0.7), 0 0 0 10px transparent;         }
      100% { box-shadow: 0 0 8px rgba(52,211,153,0.7), 0 0 0 0  transparent;           }
    }
    .biotrax-chip-contact .biotrax-chip-dot {
      animation: biotrax-chip-dot-pulse 1200ms ease-out 2700ms 1 both;
    }

    @media (prefers-reduced-motion: reduce) {
      .bullet-pulse   { animation: none; }
      .biotrax-breath { animation: none; }
      /* Chips: skip the entrance animation but still show them
         (otherwise reduced-motion users see no chips at all). */
      .biotrax-chip                            { opacity: 1; animation: none; }
      .biotrax-chip-score                      { transform: translateZ(60px); }
      .biotrax-chip-stress                     { transform: translateZ(80px); }
      .biotrax-chip-contact                    { transform: translateZ(50px); }
      .biotrax-chip-contact .biotrax-chip-dot  { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
